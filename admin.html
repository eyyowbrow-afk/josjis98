<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - JOSJIS98.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: #e0d6c8;
      overflow-x: hidden;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #c9a94e, #8b6914); border-radius: 3px; }

    :root {
      --gold: #c9a94e;
      --gold-dark: #a68a3e;
      --gold-light: #e8d48b;
      --green: #2ecc71;
      --red: #e74c3c;
      --blue: #3498db;
      --purple: #8e44ad;
    }

    .header {
      background: linear-gradient(180deg, #16213e, #1a1a2e);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid rgba(201,169,78,0.2);
      flex-wrap: wrap;
      gap: 10px;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      background: linear-gradient(135deg, var(--gold), #e8d48b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .sub {
      font-size: 11px;
      color: #8a7a8a;
      font-weight: 300;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-right a {
      color: #8a7a8a;
      text-decoration: none;
      font-size: 12px;
      padding: 6px 14px;
      border: 1px solid rgba(201,169,78,0.2);
      border-radius: 5px;
      transition: 0.3s;
    }
    .header-right a:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-title h2 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--gold);
    }
    .section-title .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 4px;
      overflow-x: auto;
    }
    .tabs .tab {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: 0.3s;
      white-space: nowrap;
      background: transparent;
      color: #8a7a8a;
      font-family: 'Poppins', sans-serif;
    }
    .tabs .tab:hover { color: var(--gold); }
    .tabs .tab.active {
      background: linear-gradient(135deg, var(--gold), #8b6914);
      color: #fff;
    }

    .admin-tab { display: none; }
    .admin-tab.active { display: block; }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(201,169,78,0.15);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #8a7a8a;
      margin-bottom: 4px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(201,169,78,0.2);
      border-radius: 6px;
      color: #e0d6c8;
      font-size: 13px;
      outline: none;
      font-family: 'Poppins', sans-serif;
    }
    .form-group input:focus { border-color: var(--gold); }

    .btn {
      border: none;
      padding: 7px 16px;
      border-radius: 5px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    .btn:hover { transform: scale(1.04); filter: brightness(1.1); }
    .btn-gold { background: linear-gradient(135deg, var(--gold), #8b6914); color: #fff; }
    .btn-green { background: linear-gradient(135deg, var(--green), #27ae60); color: #fff; }
    .btn-red { background: linear-gradient(135deg, var(--red), #c0392b); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 10px; }

    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,169,78,0.1);
      border-radius: 6px;
      font-size: 12px;
    }
    .history-item .h-game { font-weight: 600; color: #c8d6e5; }
    .history-item .h-result { font-weight: 700; }
    .history-item .h-result.win { color: var(--green); }
    .history-item .h-result.lose { color: var(--red); }
    .history-item .h-amount { font-weight: 700; }
    .history-item .h-time { font-size: 10px; color: #555; }
    .history-item .actions { display: flex; gap: 4px; align-items: center; }

    .empty-state { text-align: center; padding: 30px; color: #6b5a6b; }
    .empty-state .e-icon { font-size: 36px; margin-bottom: 8px; }
    .empty-state .e-text { font-size: 12px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(201,169,78,0.15);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .stat-box .s-num { font-size: 22px; font-weight: 800; color: var(--gold); }
    .stat-box .s-label { font-size: 10px; color: #8a7a8a; margin-top: 4px; }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 2000;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      transform: translateY(20px);
      opacity: 0;
      transition: 0.3s;
      max-width: 320px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: rgba(46,204,113,0.15); border: 1px solid var(--green); color: var(--green); }
    .toast.error { background: rgba(231,76,60,0.15); border: 1px solid var(--red); color: var(--red); }
    .toast.info { background: rgba(52,152,219,0.15); border: 1px solid var(--blue); color: var(--blue); }

    @media (max-width: 768px) {
      .header { flex-direction: column; text-align: center; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>👑 JOSJIS98 · PANEL ADMIN</h1>
    <div class="sub">⚡ Kelola user, deposit, withdraw, dan kode bonus</div>
  </div>
  <div class="header-right">
    <a href="index.html">← Kembali ke Situs Utama</a>
  </div>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-box"><div class="s-num" id="statUsers">0</div><div class="s-label">👥 Total Users</div></div>
    <div class="stat-box"><div class="s-num" id="statDeposits">0</div><div class="s-label">📩 Deposit Masuk</div></div>
    <div class="stat-box"><div class="s-num" id="statWithdraws">0</div><div class="s-label">💸 WD Masuk</div></div>
    <div class="stat-box"><div class="s-num" id="statCodes">0</div><div class="s-label">🔑 Kode Aktif</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="adminTabs">
    <button class="tab active" onclick="switchTab('requests')">📩 Deposit</button>
    <button class="tab" onclick="switchTab('users')">👥 Users</button>
    <button class="tab" onclick="switchTab('codes')">🔑 Kode</button>
    <button class="tab" onclick="switchTab('log')">📋 Log</button>
    <button class="tab" onclick="switchTab('withdraw')">💸 WD</button>
  </div>

  <!-- TAB: Deposit Requests -->
  <div class="admin-tab active" id="tabRequests">
    <div class="card"><h3>📩 Permintaan Deposit</h3><div id="requestsList" class="history-list"></div></div>
  </div>

  <!-- TAB: Users -->
  <div class="admin-tab" id="tabUsers">
    <div class="card"><h3>👥 Daftar User</h3><div id="usersList" class="history-list"></div></div>
  </div>

  <!-- TAB: Codes -->
  <div class="admin-tab" id="tabCodes">
    <div class="card" style="max-width:450px">
      <h3>🔑 Generate Kode Deposit</h3>
      <div class="form-group"><label>Nama Kode</label><input type="text" id="newCodeName" placeholder="CONTOH: BONUS50" style="text-transform:uppercase"></div>
      <div class="form-group"><label>Jumlah (Rp)</label><input type="number" id="newCodeAmount" value="50000" min="1000" step="1000"></div>
      <button class="btn btn-gold" onclick="generateCode()" style="padding:8px 20px;font-size:13px">✨ Buat Kode</button>
      <div id="existingCodes" style="margin-top:16px"></div>
    </div>
  </div>

  <!-- TAB: Log -->
  <div class="admin-tab" id="tabLog">
    <div class="card"><h3>📋 Log Transaksi</h3><div id="logList" class="history-list"></div></div>
  </div>

  <!-- TAB: Withdraw -->
  <div class="admin-tab" id="tabWithdraw">
    <div class="card"><h3>💸 Permintaan Withdraw</h3><div id="withdrawList" class="history-list"></div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="/js/api-bridge.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════════════════════════════
let users = {};
const ADMIN_PASSWORD = 'josjis98admin';

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  clearTimeout(t._hide); t._hide = setTimeout(() => t.classList.remove('show'), 3000);
}
function formatNum(n) { return Number(n).toLocaleString('id-ID'); }
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function loadData() {
  try { const u = JSON.parse(localStorage.getItem('josjis98_users')); if (u) users = u; } catch(e) {}
}
function saveUsers() { localStorage.setItem('josjis98_users', JSON.stringify(users)); }

function getDepositRequests() { try { return JSON.parse(localStorage.getItem('josjis98_deposits'))||[]; } catch(e) { return []; } }
function saveDepositRequests(r) { localStorage.setItem('josjis98_deposits', JSON.stringify(r)); }
function getWithdrawRequests() { try { return JSON.parse(localStorage.getItem('josjis98_withdraws'))||[]; } catch(e) { return []; } }
function saveWithdrawRequests(r) { localStorage.setItem('josjis98_withdraws', JSON.stringify(r)); }
function getCustomCodes() { try { return JSON.parse(localStorage.getItem('josjis98_custom_codes'))||{}; } catch(e) { return {}; } }
function saveCustomCodes(c) { localStorage.setItem('josjis98_custom_codes', JSON.stringify(c)); }

// ═══════════════════════════════════════════════════════════════
// AUTH — verifikasi ke server
// ═══════════════════════════════════════════════════════════════
function doLogin() {
  const p = prompt('Masukkan password admin:');
  if (!p) return;
  
  // Verifikasi password ke server
  try {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', window.location.origin + '/api/admin/login', false);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(JSON.stringify({ password: p }));
    
    if (xhr.status === 200) {
      localStorage.setItem('josjis98_admin', 'true');
      showToast('✅ Login berhasil!', 'success');
      renderAll();
    } else {
      showToast('❌ Password salah!', 'error');
    }
  } catch(e) {
    // Fallback ke local check jika server tidak tersedia
    if (p === ADMIN_PASSWORD) {
      localStorage.setItem('josjis98_admin', 'true');
      showToast('✅ Login berhasil! (local)', 'success');
      renderAll();
    } else {
      showToast('❌ Password salah!', 'error');
    }
  }
}

// Check if admin is logged in
(function() {
  if (localStorage.getItem('josjis98_admin') !== 'true') {
    doLogin();
  }
  loadData();
  renderAll();
})();

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#adminTabs .tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  document.querySelectorAll('#adminTabs .tab').forEach((t, i) => {
    const m = { requests:0, users:1, codes:2, log:3, withdraw:4 };
    if (m[tab] === i) t.classList.add('active');
  });
  if (tab === 'requests') renderRequests();
  if (tab === 'users') renderUsers();
  if (tab === 'codes') renderCodes();
  if (tab === 'log') renderLog();
  if (tab === 'withdraw') renderWithdraw();
}

// ═══════════════════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════════════════
function renderAll() {
  // Stats
  document.getElementById('statUsers').textContent = Object.keys(users).length;
  const deps = getDepositRequests();
  document.getElementById('statDeposits').textContent = deps.filter(x => x.status === 'pending').length;
  const wds = getWithdrawRequests();
  document.getElementById('statWithdraws').textContent = wds.filter(x => x.status === 'pending').length;
  document.getElementById('statCodes').textContent = Object.keys(getCustomCodes()).length;
  
  renderRequests();
  renderUsers();
  renderCodes();
  renderLog();
  renderWithdraw();
}

// ═══════════════════════════════════════════════════════════════
// DEPOSIT REQUESTS
// ═══════════════════════════════════════════════════════════════
function renderRequests() {
  const el = document.getElementById('requestsList');
  let r = getDepositRequests();
  const pending = r.filter(x => x.status === 'pending');
  if (pending.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="e-icon">📩</div><div class="e-text">Tidak ada permintaan deposit</div></div>';
    return;
  }
  el.innerHTML = pending.map(x => {
    const u = users[x.username];
    return `<div class="history-item">
      <div>
        <span class="h-game">👤 ${x.username}</span><br>
        <span style="font-size:11px;color:#8a7a8a">💰 Rp ${formatNum(x.koin)} ${x.kode ? '| Kode: '+x.kode : ''} ${x.sender ? '| Dari: '+x.sender : ''}</span>
      </div>
      <div class="actions">
        <button class="btn btn-sm btn-green" onclick="approveDepo('${x.id}')">✅</button>
        <button class="btn btn-sm btn-red" onclick="rejectDepo('${x.id}')">❌</button>
      </div>
    </div>`;
  }).join('');
}

function approveDepo(id) {
  let r = getDepositRequests();
  const x = r.find(y => y.id === id);
  if (!x) return;
  x.status = 'approved';
  if (users[x.username]) {
    users[x.username].balance = (users[x.username].balance||0) + x.koin;
    users[x.username].txns = users[x.username].txns||[];
    users[x.username].txns.unshift({ type:'deposit', amount:x.koin, time:new Date().toISOString(), note:'Admin approve' });
  }
  saveDepositRequests(r); saveUsers(); renderAll(); showToast('✅ Deposit approved!','success');
}

function rejectDepo(id) {
  let r = getDepositRequests();
  const x = r.find(y => y.id === id);
  if (!x) return;
  x.status = 'rejected';
  saveDepositRequests(r); renderAll(); showToast('❌ Deposit rejected','info');
}

// ═══════════════════════════════════════════════════════════════
// USERS
// ═══════════════════════════════════════════════════════════════
function renderUsers() {
  const el = document.getElementById('usersList');
  const ul = Object.values(users);
  if (ul.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="e-icon">👥</div><div class="e-text">Belum ada user</div></div>';
    return;
  }
  el.innerHTML = ul.map(u => `<div class="history-item">
    <div>
      <span class="h-game">👤 ${u.username}</span><br>
      <span style="font-size:11px;color:#8a7a8a">💰 Rp ${formatNum(u.balance||0)} | 🎮 ${(u.history||[]).length} game</span>
    </div>
    <div class="actions">
      <input type="number" id="adj_${u.username}" value="10000" style="width:70px;padding:4px 6px;background:rgba(255,255,255,0.08);border:1px solid rgba(201,169,78,0.2);border-radius:3px;color:#e0d6c8;font-size:11px;text-align:center">
      <button class="btn btn-sm btn-green" onclick="addCoin('${u.username}')">+</button>
      <button class="btn btn-sm btn-red" onclick="removeCoin('${u.username}')">-</button>
      <button class="btn btn-sm" style="background:rgba(231,76,60,0.2);color:var(--red)" onclick="deleteUser('${u.username}')">🗑</button>
    </div>
  </div>`).join('');
}

function addCoin(u) {
  const a = parseInt(document.getElementById('adj_'+u).value) || 1000;
  if (!users[u]) return;
  users[u].balance = (users[u].balance||0) + a;
  users[u].txns = users[u].txns||[];
  users[u].txns.unshift({ type:'deposit', amount:a, time:new Date().toISOString(), note:'Admin add' });
  saveUsers(); renderAll(); showToast('✅ +Rp '+formatNum(a),'success');
}

function removeCoin(u) {
  const a = parseInt(document.getElementById('adj_'+u).value) || 1000;
  if (!users[u]) return;
  users[u].balance = Math.max(0, (users[u].balance||0) - a);
  users[u].txns = users[u].txns||[];
  users[u].txns.unshift({ type:'withdraw', amount:-a, time:new Date().toISOString(), note:'Admin remove' });
  saveUsers(); renderAll(); showToast('❌ -Rp '+formatNum(a),'info');
}

function deleteUser(u) {
  if (!confirm('Hapus user "'+u+'"?')) return;
  delete users[u];
  saveUsers(); renderAll(); showToast('🗑 User dihapus','info');
}

// ═══════════════════════════════════════════════════════════════
// CODES
// ═══════════════════════════════════════════════════════════════
function renderCodes() {
  const el = document.getElementById('existingCodes');
  const c = getCustomCodes();
  const keys = Object.keys(c);
  if (keys.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="e-icon">🔑</div><div class="e-text">Belum ada kode deposit</div></div>';
    return;
  }
  el.innerHTML = '<h4 style="font-size:13px;color:var(--gold);margin-bottom:8px">📋 Kode Tersedia:</h4><div class="history-list">' +
    keys.map(k => `<div class="history-item">
      <span class="h-game">🔑 ${k} = Rp ${formatNum(c[k])}</span>
      <button class="btn btn-sm btn-red" onclick="deleteCode('${k}')">🗑</button>
    </div>`).join('') + '</div>';
}

function generateCode() {
  const n = document.getElementById('newCodeName').value.trim().toUpperCase();
  const a = parseInt(document.getElementById('newCodeAmount').value) || 0;
  if (!n || a < 1000) { showToast('Isi kode dan jumlah!','error'); return; }
  let c = getCustomCodes();
  c[n] = a;
  saveCustomCodes(c);
  showToast('✅ Kode '+n+' = Rp '+formatNum(a),'success');
  document.getElementById('newCodeName').value = '';
  renderAll();
}

function deleteCode(k) {
  let c = getCustomCodes();
  delete c[k];
  saveCustomCodes(c);
  renderAll(); showToast('🗑 Kode dihapus','info');
}

// ═══════════════════════════════════════════════════════════════
// LOG
// ═══════════════════════════════════════════════════════════════
function renderLog() {
  const el = document.getElementById('logList');
  let allTxns = [];
  Object.values(users).forEach(u => {
    (u.txns||[]).forEach(t => {
      allTxns.push({ user: u.username, ...t });
    });
  });
  allTxns.sort((a,b) => new Date(b.time) - new Date(a.time));
  if (allTxns.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="e-icon">📋</div><div class="e-text">Belum ada transaksi</div></div>';
    return;
  }
  el.innerHTML = allTxns.slice(0, 50).map(t => {
    const isPlus = t.amount > 0 || t.type === 'deposit';
    return `<div class="history-item">
      <span class="h-game">👤 ${t.user} | ${t.type.toUpperCase()} ${t.note ? '| '+t.note : ''}</span>
      <span style="font-weight:700;color:${isPlus ? 'var(--green)' : 'var(--red)'}">${isPlus ? '+':''}Rp ${formatNum(Math.abs(t.amount))}</span>
      <span class="h-time">${new Date(t.time).toLocaleDateString('id-ID')} ${new Date(t.time).toLocaleTimeString('id-ID')}</span>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// WITHDRAW
// ═══════════════════════════════════════════════════════════════
function renderWithdraw() {
  const el = document.getElementById('withdrawList');
  let r = getWithdrawRequests();
  const pending = r.filter(x => x.status === 'pending');
  if (pending.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="e-icon">💸</div><div class="e-text">Tidak ada permintaan withdraw</div></div>';
    return;
  }
  el.innerHTML = pending.map(x => {
    return `<div class="history-item">
      <div>
        <span class="h-game">👤 ${x.username}</span><br>
        <span style="font-size:11px;color:#8a7a8a">💰 Rp ${formatNum(x.amount)} | ${x.bank ? x.bank+' - '+x.account : ''}</span>
      </div>
      <div class="actions">
        <button class="btn btn-sm btn-green" onclick="approveWd('${x.id}')">✅</button>
        <button class="btn btn-sm btn-red" onclick="rejectWd('${x.id}')">❌</button>
      </div>
    </div>`;
  }).join('');
}

function approveWd(id) {
  let r = getWithdrawRequests();
  const x = r.find(y => y.id === id);
  if (!x) return;
  x.status = 'approved';
  saveWithdrawRequests(r); renderAll(); showToast('✅ WD approved','success');
}

function rejectWd(id) {
  let r = getWithdrawRequests();
  const x = r.find(y => y.id === id);
  if (!x) return;
  x.status = 'rejected';
  if (users[x.username]) {
    users[x.username].balance = (users[x.username].balance||0) + x.amount;
  }
  saveWithdrawRequests(r); saveUsers(); renderAll(); showToast('❌ WD rejected, balance returned','info');
}
</script>
</body>
</html>
